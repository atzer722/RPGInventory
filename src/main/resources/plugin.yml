name: RPGInventory
main: com.atzer.RPGInventory
version: "2.2"
api-version: "1.21"
load: POSTWORLD
prefix: RPGInventory
author: Atzer
description: "This plugin transform the main inventory into a rpg inventory."
depend: [ItemsAdder, LuckPerms, MMOItems]

commands:
  inventory:
    description: "Open the RPG inventory."
    permission: rpginventory.inventory
    permission-message: "You need to have the rpginventory.inventory permission to use this command."
    aliases:
      - inv
      - rpginventory
      - ri

  reload:
    description: "Reload the plugin."
    permission: rpginventory.reload
    permission-message: "You need to have the rpginventory.reload permission to use this command."